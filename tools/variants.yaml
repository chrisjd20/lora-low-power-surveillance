# Warden Apex Master — per-tier assembly variants
# Source of truth for tools/phase12_variants.py
#
# Three tiers populate the same PCB with different components.
# Gerbers / drill / IPC-D-356 are identical across all three.
# Only the BOM and the Pick-and-Place file differ.
#
# DNP ("do not populate"): listed refdes are left UNPOPULATED for the tier.
# Everything else gets stuffed.
#
# Phase 19 added three always-populated charger-section resistors
# (not listed in any DNP block below -> they are stuffed on every tier):
#   R20 - 7.15 k, BQ24650 VFB upper divider (sets LiFePO4 3.60 V float)
#   R21 - 10 k,  BQ24650 TS  upper divider (biases TS to safe ~1.05 V)
#   R22 - 100 k, BQ24650 MPPSET upper divider (6 V panel V_IN(REG)=5.25 V)
# Plus a schematic Value change (C5 100 nF -> 1 uF) and several net
# re-wires (IC3.3 PS/SYNC -> GND, IC3.4 VSEL -> GND, R2.1 CHG_SENSE_NEG
# -> GND, R4.2/R5.2 GND -> 3V3). No refdes added/removed.
#
# Phase 20 universal-recovery edits (no refdes added/removed, DNP
# set unchanged; topology fixes only):
#   - SIM7080G VDD_EXT (IC1.69 + C29.1) moved to its own /SIM_VDD_EXT
#     net; no longer destructively tied to /3V3.
#   - /UART1_TX / /UART1_RX now dedicated cellular path:
#     XIAO U1.19 (GPIO40) <-> SIM7080 IC1.34, and XIAO U1.18 (GPIO41)
#     + R17 pull-down <-> SIM7080 IC1.40.  The ex-JTAG pins are
#     explicitly repurposed for UART1.
#   - /UART2_TX / /UART2_RX reserved for Swarm M138 behind the
#     SC16IS740 bridge (U6) plus solder jumpers JP3 / JP4.
#   - R17 stays populated on every tier (UART1_RX pull-down; harmless
#     on Drone, meaningful when IC1 is stuffed).
#
# UART1 is currently a direct path on all tiers (`U1` <-> `IC1` on
# `/UART1_TX` + `/UART1_RX`). The experimental translator chain refs
# (`U7`, `C35`, `C36`, `R25`) were removed from the live schematic so the
# generated BOM/POS outputs remain tier-consistent with the committed PCB.

drone:
  description: |
    Tier 1. LoRa + BLE/WiFi only. Distributed sensor node. ~$35.
    No cellular, no satellite, no modem rail, no I2C-UART bridge.
    Default solder-jumper config: JP1 OPEN (no modem rail), JP2 OPEN
    (SIM holder disconnected), JP3 / JP4 irrelevant (both modems DNP).
  dnp:
    # Cellular modem
    - IC1      # SIM7080G
    - Card1    # Nano-SIM holder
    - J1       # cellular U.FL antenna
    - D1       # cellular TVS
    - U5       # SRV05-4 TVS cluster for cellular
    - C29      # IC1 SIM_VDD_EXT (1.8 V) decoupler (B.Cu, under SIM7080G)
    # Satellite modem
    - U3       # Swarm M138
    - U6       # SC16IS740 I2C-UART bridge
    - X1       # 14.7456 MHz crystal for U6
    - C23      # crystal load cap
    - C24      # crystal load cap
    - C25      # U6 decoupler 100 nF
    - C26      # U6 decoupler 10 uF
    - C30      # Swarm V_BAT HF decoupler (100 nF)
    - C31      # Swarm V_BAT bulk (47 uF / 1206)
    # Modem rail (not needed without any modem)
    - Q2       # P-MOSFET load switch
    - Q3       # N-MOSFET driver
    - R16      # Q2 gate pull-up
    - R18      # UART2_RX pull-down
    - R19      # UART2_TX pull-down
    # Solder jumpers that relate to absent components
    - JP1      # JP_MODEM_RAIL
    - JP2      # JP_SIM_VCC
    - JP3      # JP_SAT_UART_TX
    - JP4      # JP_SAT_UART_RX

cell_master:
  description: |
    Tier 2. LoRa + BLE/WiFi + Cellular (SIM7080G). Town-wide gateway. ~$55.
    Default solder-jumper config: JP1 OPEN (firmware-gated modem rail),
    JP2 CLOSED (SIM VCC connected), JP3/JP4 OPEN (Swarm absent).
  dnp:
    # Satellite-only components are DNP for Cell Master
    - U3       # Swarm M138
    - U6       # SC16IS740 I2C-UART bridge
    - X1       # 14.7456 MHz crystal
    - C23      # crystal load cap
    - C24      # crystal load cap
    - C25      # U6 decoupler 100 nF
    - C26      # U6 decoupler 10 uF
    - C30      # Swarm V_BAT HF decoupler (100 nF)
    - C31      # Swarm V_BAT bulk (47 uF / 1206)
    - R18      # UART2_RX pull-down (Swarm/U6 path unused on Cell Master)
    - R19      # UART2_TX pull-down (Swarm/U6 path unused on Cell Master)
    - JP3      # JP_SAT_UART_TX
    - JP4      # JP_SAT_UART_RX

apex:
  description: |
    Tier 3. LoRa + BLE/WiFi + Cellular + Satellite. Full global fallback. ~$95.
    Default solder-jumper config: JP1 OPEN (Q2 gates modem rail under firmware),
    JP2 CLOSED (SIM VCC connected), JP3 CLOSED (SC16→Swarm TX),
    JP4 CLOSED (Swarm→SC16 RX).
  dnp: []
